<!--
  FinHive MAGIC LINK email template -- used only by the /login page's
  self-service "sign in with a link" flow (the person requesting the link is
  the same person who clicks it, on the same device), NOT invites.

  Where to paste this: Supabase Dashboard -> your FinHive project ->
  Authentication -> Email Templates -> "Magic Link".

  Subject line suggestion: Sign in to FinHive

  Same reasoning as the invite template (see supabase-invite-email-template.html)
  for why this links to our own /auth/callback with ?token_hash=...&type=magiclink
  instead of {{ .ConfirmationURL }} -- it's not strictly required for this
  self-service case since same-device PKCE works fine here, but keeping both
  templates consistent means /auth/callback only has to support one real path.
-->
<div style="font-family: Arial, Helvetica, sans-serif; max-width: 480px; margin: 0 auto; padding: 32px 24px; background:#ffffff; color: #171717;">

  <div style="text-align:center; margin-bottom: 28px;">
    <span style="display:inline-block; padding: 6px 16px; border-radius: 999px; background:#0F2A3D; color:#ffffff; font-size:13px; font-weight:600; letter-spacing:0.03em;">
      FinHive
    </span>
  </div>

  <h1 style="font-size:20px; line-height:1.3; margin:0 0 12px; color:#0F2A3D; text-align:center;">
    Sign in to FinHive
  </h1>
  <p style="font-size:15px; line-height:1.6; color:#3f3f46; margin:0 0 8px; text-align:center;">
    Click below to securely sign in to your FinHive dashboard.
  </p>

  <div style="text-align:center; margin: 28px 0;">
    <a href="https://finhive-app-roan.vercel.app/auth/callback?token_hash={{ .TokenHash }}&amp;type=magiclink"
       style="display:inline-block; background:#1E9E6B; color:#ffffff !important; text-decoration:none; font-weight:600; font-size:15px; padding:12px 32px; border-radius:8px;">
      Sign in
    </a>
  </div>

  <p style="font-size:13px; color:#a1a1aa; line-height:1.5; margin: 24px 0 0; text-align:center;">
    This link is single-use and expires shortly. If you weren't expecting this
    email, you can safely ignore it.
  </p>

  <hr style="border:none; border-top:1px solid #f0f0f1; margin:28px 0 16px;" />

  <p style="font-size:12px; color:#c4c4c8; text-align:center; margin:0;">
    Sent by FinHive &middot; finance tracking for teams
  </p>

</div>
